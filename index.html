<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>25th Ward Temple Tracker</title>
  <!-- Google Fonts: Cinzel for headers, Outfit for body text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Style stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- FontAwesome for clean icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-light">
  
  <div class="app-container">
    <!-- Header -->
    <header>
      <div class="logo-area">
        <i class="fa-solid fa-place-of-worship gold-text logo-icon"></i>
        <h1>25th Ward Temple Tracker</h1>
      </div>
      <div class="header-controls">
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </header>

    <!-- Main Content Grid -->
    <main class="dashboard-grid">
      
      <!-- Counter Card & Actions -->
      <section class="card counter-card">
        <div class="card-glow"></div>
        <h2 class="section-title">Current Progress</h2>
        
        <div class="counter-display">
          <div class="circle-progress">
            <svg class="progress-ring" width="220" height="220">
              <circle class="progress-ring__background" stroke-width="8" fill="transparent" r="95" cx="110" cy="110"/>
              <circle class="progress-ring__circle" stroke-width="12" fill="transparent" r="95" cx="110" cy="110"/>
            </svg>
            <div class="counter-number-container">
              <span id="current-count" class="counter-number">0</span>
              <span class="counter-divider">/</span>
              <span id="goal-count" class="counter-total">100</span>
            </div>
          </div>
        </div>

        <div class="goal-text-summary">
          <p>Goal: <span class="gold-text bold">100 visits</span> to the House of the Lord</p>
          <div id="percentage-label" class="badge">0% Completed</div>
        </div>

        <!-- Progress Bar (Fallback / Secondary view) -->
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%"></div>
        </div>

        <button id="open-visit-btn" class="btn-primary">
          <i class="fa-solid fa-plus"></i> Record a Visit
        </button>
      </section>

      <!-- History Feed -->
      <section class="card history-card">
        <div class="card-glow"></div>
        <div class="history-header">
          <h2 class="section-title"><i class="fa-solid fa-list-check"></i> Live Activity Feed</h2>
          <span class="live-indicator"><span class="dot"></span> LIVE SYNC</span>
        </div>
        <div class="history-list" id="visits-list">
          <!-- Dynamically populated -->
          <div class="empty-state">
            <i class="fa-solid fa-church opacity-30"></i>
            <p>No visits recorded yet. Be the first to add one!</p>
          </div>
        </div>
      </section>

      <!-- Temple Image Reveal Card -->
      <section class="card temple-reveal-card">
        <div class="card-glow"></div>
        <h2 class="section-title">Orem Temple Reveal</h2>
        <div class="temple-frame">
          <img src="orem_temple.png" alt="Orem Utah Temple" class="temple-image">
          <div class="tiles-grid" id="tiles-grid">
            <!-- Dynamically populated with tiles -->
          </div>
        </div>
      </section>

    </main>

    <!-- Form Modal -->
    <div class="modal-overlay" id="visit-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Record Temple Visit</h3>
          <button id="close-modal-btn" class="btn-close">&times;</button>
        </div>
        <form id="visit-form">
          <div class="form-group">
            <label for="visitor-name">Your Name</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-user"></i>
              <input type="text" id="visitor-name" placeholder="e.g. Brother & Sister Smith" maxlength="50" required>
            </div>
          </div>
          <div class="form-group">
            <label for="visit-note">Experience / Notes <span class="optional">(Optional)</span></label>
            <div class="input-wrapper">
              <i class="fa-solid fa-comment-medical"></i>
              <textarea id="visit-note" placeholder="Share a thought, temple name, or sealing/endowment session..." maxlength="150" rows="3"></textarea>
            </div>
          </div>
          <button type="submit" class="btn-submit">
            Submit & Sync <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </div>
    </div>

    <!-- Admin / Utility Actions (Reset) in footer -->
    <footer>
      <p>Synchronized in real-time across all ward members.</p>
      <button id="reset-btn" class="btn-link">Reset Counter</button>
    </footer>
  </div>

  <!-- Socket.io client library -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Client JavaScript -->
  <script src="client.js"></script>
</body>
</html>
